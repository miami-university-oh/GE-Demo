services:
  iiot-dashboard:
    build: .
    image: iiot-dashboard:latest
    container_name: iiot-dashboard
    # Single exposed port: cam02 HLS is proxied through the backend, mediamtx stays internal
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./.env:/app/.env:ro
