site_name: IIoT Building Dashboard
site_description: >-
  Documentation for the IIoT Building Dashboard — a real-time industrial
  monitoring system combining a React/TypeScript frontend, Python machine
  bridges, and computer-vision camera pipelines.
site_url: https://<YOUR_GITHUB_USERNAME>.github.io/iiot-building-dashboard/
repo_url: https://github.com/<YOUR_GITHUB_USERNAME>/iiot-building-dashboard
repo_name: iiot-building-dashboard
edit_uri: edit/main/docs/

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs           # top-level sections become tabs
    - navigation.tabs.sticky
    - navigation.sections       # expand sections in the sidebar
    - navigation.expand
    - navigation.top            # "back to top" button
    - navigation.indexes        # section index pages
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav:
  - Home: index.md
  - Frontend:
    - Overview: frontend/overview.md
    - Pages: frontend/pages.md
    - Components: frontend/components.md
    - Hooks & Libraries: frontend/hooks-lib.md
    - Shared Constants: shared/const.md
  - Machine Bridges:
    - HAAS CNC Bridge: bridges/haas.md
    - UR5e Robot Bridge: bridges/ur5e.md
    - Isaac Sim Stream: bridges/isaac.md
  - Camera Pipelines:
    - RealSense Stream: camera/realsense.md
    - Amcrest + YOLO: camera/amcrest.md
    - Safety Monitor: camera/safety.md
  - API Reference:
    - Python API: api/python.md
    - TypeScript API: api/typescript.md

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  - search                        # built-in full-text search

  # Auto-generate nav from the docs/ folder structure (optional).
  # Comment out the nav: block above and enable this instead if you want
  # fully automatic navigation.
  # - awesome-pages

  # Python docstring extraction via Griffe
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - .                   # project root — lets Griffe find all packages
            - machine-bridges
            - camera-streaming-setup
          options:
            docstring_style: google   # or numpy / sphinx
            show_source: true
            show_bases: true
            show_root_heading: true
            show_submodules: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            unwrap_annotated: true
            merge_init_into_class: true
            filters:
              - "!^_"              # hide private members by default

# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

# ---------------------------------------------------------------------------
# Extra
# ---------------------------------------------------------------------------
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/<YOUR_GITHUB_USERNAME>

extra_css:
  - stylesheets/extra.css         # optional — create if you want custom CSS
