name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manually triggering a build from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN permission to push to gh-pages
permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Generate TypeScript API docs with TypeDoc
  # ---------------------------------------------------------------------------
  typedoc:
    name: Generate TypeDoc markdown
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate TypeDoc markdown
        run: pnpm run docs:ts

      # Upload the generated markdown so the MkDocs job can use it
      - name: Upload TypeDoc output
        uses: actions/upload-artifact@v4
        with:
          name: typedoc-markdown
          path: docs/typedoc/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 2. Build MkDocs site and deploy to GitHub Pages
  # ---------------------------------------------------------------------------
  mkdocs:
    name: Build & deploy MkDocs
    runs-on: ubuntu-latest
    needs: typedoc   # wait for TypeDoc markdown to be generated

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so mkdocs-material git-revision-date works
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs-requirements.txt

      - name: Install Python documentation dependencies
        run: pip install -r docs-requirements.txt

      # Pull in the TypeDoc markdown that was generated in the previous job
      - name: Download TypeDoc output
        uses: actions/download-artifact@v4
        with:
          name: typedoc-markdown
          path: docs/typedoc/

      - name: Build & deploy MkDocs site
        run: mkdocs gh-deploy --force --clean --verbose
        env:
          # mkdocs gh-deploy pushes to the gh-pages branch using this token
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
